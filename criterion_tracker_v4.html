<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criterion Collection Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8f7f4;color:#1a1a1a;padding:20px}
.wrap{max-width:920px;margin:0 auto}
h1{font-size:26px;font-weight:500;letter-spacing:-0.5px;margin-bottom:4px}
h1 span{font-size:13px;color:#888;font-weight:400;margin-left:8px}
.tabs-nav{display:flex;gap:2px;background:#eeebe5;border-radius:10px;padding:3px;margin:16px 0}
.tabs-nav button{flex:1;padding:8px 16px;font-size:13px;border:none;border-radius:8px;cursor:pointer;background:transparent;color:#888;font-weight:400;transition:all .15s}
.tabs-nav button.active{background:#fff;color:#1a1a1a;font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.tab-content{display:none}.tab-content.active{display:block}
.nf-bar{background:#fff;border:1px solid #d4cfc5;border-left:4px solid #5B7FA5;border-radius:10px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:box-shadow .15s}
.nf-bar:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.nf-badge{background:#5B7FA5;color:#fff;font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;letter-spacing:.5px;white-space:nowrap}
.nf-body{flex:1;min-width:0}
.nf-title{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nf-meta{font-size:12px;color:#888}
.nf-arrow{color:#5B7FA5;font-size:20px;flex-shrink:0}
.nf-reroll{background:none;border:1px solid #c4c0b8;border-radius:6px;padding:5px 10px;font-size:11px;color:#888;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.nf-reroll:hover{border-color:#5B7FA5;color:#5B7FA5}
.stats{display:flex;gap:12px;margin:16px 0;flex-wrap:wrap}
.stat-card{background:#fff;border-radius:10px;padding:14px 18px;border:1px solid #e8e5df}
.stat-card.main{flex:1;min-width:140}
.stat-card.waves{flex:2;min-width:280}
.stat-label{font-size:13px;color:#888;margin-bottom:4px}
.stat-num{font-size:24px;font-weight:500}
.stat-num small{font-size:14px;color:#888;font-weight:400}
.bar-bg{height:4px;background:#e8e5df;border-radius:2px;margin-top:6px}
.bar-fill{height:4px;border-radius:2px;transition:width .3s}
.pct{font-size:12px;color:#aaa;margin-top:3px}
.wave-row{display:flex;align-items:center;gap:6px;padding:2px 0;cursor:pointer;opacity:.7;transition:opacity .15s}
.wave-row:hover,.wave-row.active{opacity:1}
.wave-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.wave-name{font-size:11px;color:#888;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wave-count{font-size:11px;color:#aaa;min-width:50px;text-align:right}
.wave-bar{width:40px;height:3px;background:#e8e5df;border-radius:1px}
.wave-bar-fill{height:3px;border-radius:1px}
.filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filters input[type=text]{flex:1;min-width:180px;padding:9px 14px;font-size:14px;border:1px solid #d4d0c8;border-radius:8px;background:#fff;outline:none}
.filters input[type=text]:focus{border-color:#5B7FA5}
.filters select{padding:9px 10px;font-size:12px;border:1px solid #d4d0c8;border-radius:8px;background:#fff;outline:none}
.tab-group{display:flex;gap:2px;background:#eeebe5;border-radius:8px;padding:2px}
.tab-btn{padding:6px 12px;font-size:12px;border:none;border-radius:6px;cursor:pointer;background:transparent;color:#888}
.tab-btn.active{background:#fff;color:#1a1a1a;font-weight:500;box-shadow:0 0 0 1px #d4d0c8}
.active-filter{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:6px 12px;background:#fff;border-radius:8px;border:1px solid #e8e5df}
.active-filter span{font-size:13px;color:#888}
.active-filter button{margin-left:auto;font-size:12px;padding:2px 8px;border:1px solid #d4d0c8;border-radius:4px;cursor:pointer;background:transparent;color:#888}
.count-info{font-size:13px;color:#aaa;margin-bottom:8px}
.film-list{display:flex;flex-direction:column;gap:2px}
.film{border-radius:8px;border:1px solid #e8e5df;overflow:hidden;background:#fff;transition:background .15s}
.film.watched{background:#f5f4f0}
.film-row{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer}
.film-stripe{width:5px;height:32px;border-radius:3px;flex-shrink:0}
.film-spine{width:42px;font-size:12px;color:#aaa;font-family:'SF Mono',Consolas,monospace;flex-shrink:0;text-align:right}
.film-info{flex:1;min-width:0}
.film-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.film-meta{font-size:12px;color:#888}
.film-rating{font-size:13px;color:#C9A227;flex-shrink:0}
.film-rt{font-size:11px;color:#aaa;flex-shrink:0}
.check{width:24px;height:24px;border-radius:12px;border:1.5px solid #c4c0b8;background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s}
.check.done{border:none;background:#5B7FA5}
.film-expand{padding:8px 14px 12px 70px;border-top:1px solid #e8e5df;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.film-expand label{font-size:12px;color:#888}
.film-expand input{margin-left:6px;padding:5px 8px;font-size:12px;border:1px solid #d4d0c8;border-radius:4px;background:#fff}
.film-expand input[type=number]{width:54px}
.btn-save{padding:6px 16px;font-size:12px;border:none;border-radius:6px;cursor:pointer;background:#5B7FA5;color:#fff;font-weight:500}
.pager{display:flex;justify-content:center;gap:8px;margin-top:16px;align-items:center}
.pager button{padding:7px 16px;font-size:13px;border:1px solid #d4d0c8;border-radius:8px;cursor:pointer;background:#fff}
.pager button:disabled{opacity:.4;cursor:default}
.pager span{font-size:13px;color:#888}
.footer{margin-top:24px;font-size:11px;color:#aaa;text-align:center;padding:12px 0}
.footer button{font-size:11px;cursor:pointer;background:none;border:none;text-decoration:underline;margin:0 6px}
.footer .reset{color:#c44}.footer .export{color:#5B7FA5}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin:16px 0}
.dash-card{background:#fff;border-radius:10px;padding:16px 20px;border:1px solid #e8e5df}
.dash-card .dl{font-size:13px;color:#888;margin-bottom:2px}
.dash-card .dv{font-size:28px;font-weight:500}
.dash-card .dv small{font-size:14px;color:#888;font-weight:400}
.dash-card .dsub{font-size:11px;color:#aaa;margin-top:2px}
.chart-wrap{background:#fff;border-radius:10px;padding:18px 20px;border:1px solid #e8e5df;margin-bottom:12px}
.chart-wrap h3{font-size:14px;font-weight:500;margin-bottom:12px;color:#555}
.hbar{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.hbar-label{font-size:11px;color:#888;width:85px;text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbar-track{flex:1;height:16px;background:#f0ede7;border-radius:3px;overflow:hidden}
.hbar-fill{height:16px;border-radius:3px;transition:width .3s}
.hbar-val{font-size:11px;color:#888;min-width:28px;flex-shrink:0}
.pie-container{display:flex;justify-content:center;align-items:center;gap:20px;flex-wrap:wrap}
.pie-legend{display:flex;flex-direction:column;gap:4px}
.pie-legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#666}
.pie-legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.top-list{list-style:none}
.top-list li{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f0ede7;font-size:13px}
.top-list li:last-child{border:none}
.top-list .tl-name{color:#444;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.top-list .tl-stars{color:#C9A227;flex-shrink:0;margin-left:8px}
.est-card{background:linear-gradient(135deg,#f8f7f4,#eeeae2);border:1px solid #d8d4cc;border-radius:10px;padding:18px 20px;margin:16px 0}
.est-card .et{font-size:13px;color:#888;margin-bottom:4px}
.est-card .eb{font-size:22px;font-weight:500}
.est-card .es{font-size:12px;color:#aaa;margin-top:4px}
.streak-badge{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid #e8e5df;border-radius:8px;padding:8px 14px;font-size:13px;color:#C9A227;font-weight:500}
</style>
</head>

// TMDB fetch
async function fetchTmdb(spine,title,year){
  if(tmdbCache[spine])return tmdbCache[spine];
  try{
    const q=encodeURIComponent(title.replace(/\/.*/,'').trim());
    const url=`https://api.themoviedb.org/3/search/movie?query=${q}&year=${year||''}&language=fr-FR`;
    const r=await fetch(url,{headers:{Authorization:`Bearer ${TMDB_TOKEN}`}});
    const d=await r.json();
    if(d.results&&d.results.length){
      const m=d.results[0];
      // Get details for runtime
      const dr=await fetch(`https://api.themoviedb.org/3/movie/${m.id}?language=fr-FR`,{headers:{Authorization:`Bearer ${TMDB_TOKEN}`}});
      const dd=await dr.json();
      tmdbCache[spine]={overview:m.overview||'',runtime:dd.runtime||0,tmdb_id:m.id};
      saveTmdb();
      return tmdbCache[spine];
    }
  }catch(e){}
  return null;
}

function getFiltered(){
  let f=FILMS;
  if(search){const s=search.toLowerCase();f=f.filter(m=>m.title.toLowerCase().includes(s)||m.director.toLowerCase().includes(s)||String(m.spine).includes(s));}
  if(waveFilter>=0)f=f.filter(m=>m.wave===waveFilter);
  if(countryFilter)f=f.filter(m=>m.country===countryFilter);
  if(showFilter==='watched')f=f.filter(m=>watched[m.spine]);
  if(showFilter==='unwatched')f=f.filter(m=>!watched[m.spine]);
  // Sort
  if(sortBy==='spine')f=[...f].sort((a,b)=>a.spine-b.spine);
  else if(sortBy==='year')f=[...f].sort((a,b)=>(a.year||0)-(b.year||0));
  else if(sortBy==='year-desc')f=[...f].sort((a,b)=>(b.year||0)-(a.year||0));
  else if(sortBy==='title')f=[...f].sort((a,b)=>a.title.localeCompare(b.title));
  else if(sortBy==='rating')f=[...f].sort((a,b)=>{const ra=watched[a.spine]?parseFloat(watched[a.spine].rating)||0:0;const rb=watched[b.spine]?parseFloat(watched[b.spine].rating)||0:0;return rb-ra;});
  else if(sortBy==='date-watched')f=[...f].sort((a,b)=>{const da=watched[a.spine]?watched[a.spine].date||'':'';const db=watched[b.spine]?watched[b.spine].date||'':'' ;return db.localeCompare(da);});
  return f;
}
function getRatedFilms(){return FILMS.filter(m=>watched[m.spine]&&watched[m.spine].rating&&parseFloat(watched[m.spine].rating)>0);}
function getAvgRating(){const r=getRatedFilms();if(!r.length)return 0;return(r.reduce((s,m)=>s+parseFloat(watched[m.spine].rating),0)/r.length);}
function getRuntime(m){if(tmdbCache[m.spine]&&tmdbCache[m.spine].runtime)return tmdbCache[m.spine].runtime;return m.runtime||0;}
function getTotalRuntime(){
  const wf=FILMS.filter(m=>watched[m.spine]);
  let total=0;
  wf.forEach(m=>{const rt=getRuntime(m);total+=rt||AVG_RT;});
  return total;
}
function fmtTime(min){const h=Math.floor(min/60);const d=Math.floor(h/24);if(d>0)return`${d}j ${h%24}h`;return`${h}h ${min%60}m`;}

function getStreak(){
  const dates=[...new Set(Object.values(watched).map(w=>w.date).filter(Boolean))].sort();
  if(!dates.length)return 0;
  // Calculate weekly streak from most recent
  const now=new Date();
  const getWeek=d=>{const dt=new Date(d);const start=new Date(dt.getFullYear(),0,1);return Math.ceil(((dt-start)/86400000+start.getDay()+1)/7);};
  const getYW=d=>{const dt=new Date(d);return dt.getFullYear()*100+getWeek(d);};
  const weeks=[...new Set(dates.map(d=>getYW(d)))].sort((a,b)=>b-a);
  if(!weeks.length)return 0;
  let streak=1;
  for(let i=0;i<weeks.length-1;i++){
    const diff=weeks[i]-weeks[i+1];
    if(diff===1||(weeks[i]%100===1&&diff>50))streak++;
    else break;
  }
  return streak;
}

let surpriseFilm=null;
function rollSurprise(){
  let pool=FILMS.filter(m=>!watched[m.spine]&&m.spine>0);
  if(waveFilter>=0)pool=pool.filter(m=>m.wave===waveFilter);
  if(countryFilter)pool=pool.filter(m=>m.country===countryFilter);
  if(!pool.length)pool=FILMS.filter(m=>!watched[m.spine]&&m.spine>0);
  if(!pool.length){surpriseFilm=null;return;}
  surpriseFilm=pool[Math.floor(Math.random()*pool.length)];
}
function getNextFilm(){
  if(!surpriseFilm)rollSurprise();
  return surpriseFilm;
}

function drawPie(canvas,segments){
  const ctx=canvas.getContext('2d');const w=canvas.width=180;const h=canvas.height=180;
  const cx=w/2,cy=h/2,radius=80;let start=-Math.PI/2;
  const total=segments.reduce((s,seg)=>s+seg.val,0);
  if(total===0){ctx.beginPath();ctx.arc(cx,cy,radius,0,Math.PI*2);ctx.fillStyle='#e8e5df';ctx.fill();ctx.fillStyle='#aaa';ctx.font='13px -apple-system,sans-serif';ctx.textAlign='center';ctx.fillText('Aucune note',cx,cy+5);return;}
  segments.forEach(seg=>{const slice=seg.val/total*Math.PI*2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,radius,start,start+slice);ctx.closePath();ctx.fillStyle=seg.color;ctx.fill();start+=slice;});
  ctx.beginPath();ctx.arc(cx,cy,45,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  const avg=getAvgRating();ctx.fillStyle='#1a1a1a';ctx.font='bold 20px -apple-system,sans-serif';ctx.textAlign='center';ctx.fillText(avg?avg.toFixed(1):'—',cx,cy+2);
  ctx.fillStyle='#aaa';ctx.font='11px -apple-system,sans-serif';ctx.fillText('moyenne',cx,cy+16);
}

function render(){

  }
  h+=`<div class="stats"><div class="stat-card main"><div class="stat-label">Progression</div><div class="stat-num">${watchedCount}<small> / ${FILMS.length}</small></div><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:#5B7FA5"></div></div><div class="pct">${pct}%</div></div>`;
  h+=`<div class="stat-card waves"><div class="stat-label">Vagues Criterion</div>`;
  waveStats.forEach((ws,i)=>{h+=`<div class="wave-row${waveFilter===i?' active':''}" onclick="setWave(${i})"><div class="wave-dot" style="background:${WAVE_COLORS[i]}"></div><div class="wave-name">${ws.name}</div><div class="wave-count">${ws.done}/${ws.total}</div><div class="wave-bar"><div class="wave-bar-fill" style="width:${ws.pct}%;background:${WAVE_COLORS[i]}"></div></div></div>`;});
  h+=`</div></div>`;
  h+=`<div class="filters">`;
  h+=`<input type="text" placeholder="Rechercher titre, directeur, #spine..." value="${search}" oninput="setSearch(this.value)">`;
  h+=`<select onchange="setCountry(this.value)"><option value="">Tous pays</option>`;
  countries.forEach(c=>{h+=`<option value="${c}"${countryFilter===c?' selected':''}>${c}</option>`;});
  h+=`</select>`;
  h+=`<select class="sort-select" onchange="setSort(this.value)">`;
  [['spine','Spine #'],['title','Titre A-Z'],['year','Année ↑'],['year-desc','Année ↓'],['rating','Note ↓'],['date-watched','Vu récemment']].forEach(([v,l])=>{h+=`<option value="${v}"${sortBy===v?' selected':''}>${l}</option>`;});
  h+=`</select>`;
  h+=`<div class="tab-group">`;
  [['all','Tous'],['unwatched','À voir'],['watched','Vus']].forEach(([v,l])=>{h+=`<button class="tab-btn${showFilter===v?' active':''}" onclick="setShow('${v}')">${l}</button>`;});

  if(waveFilter>=0)h+=`<div class="active-filter"><div class="wave-dot" style="background:${WAVE_COLORS[waveFilter]}"></div><span>${WAVES[waveFilter]}</span><button onclick="setWave(-1)">Retirer filtre</button></div>`;

  h+=`</div>`;

  // STATS TAB
  h+=`<div class="tab-content${activeTab==='stats'?' active':''}">${renderStats()}</div>`;

  h+=`<div class="footer">Données: spines #1–1312 | TMDB pour synopsis & durées<br>`;
  h+=`<button class="export" onclick="exportData()">Exporter progression</button>`;
  h+=`<button class="export" onclick="document.getElementById('imp').click()">Importer</button>`;
  h+=`<input type="file" id="imp" accept=".json" style="display:none" onchange="importData(event)">`;
  h+=`<button class="reset" onclick="if(confirm('Effacer toute ta progression?')){watched={};tmdbCache={};save();saveTmdb();render();}">Réinitialiser</button>`;
  h+=`</div>`;
  document.getElementById('app').innerHTML=h;
  if(activeTab==='stats'){
    const canvas=document.getElementById('pie');
    if(canvas){
      const rated=getRatedFilms();
      const buckets=[{label:'9-10',min:9,max:10,color:'#3B6BAB'},{label:'7-8.5',min:7,max:8.5,color:'#5B7FA5'},{label:'5-6.5',min:5,max:6.5,color:'#7A8B6F'},{label:'3-4.5',min:3,max:4.5,color:'#C9A227'},{label:'0-2.5',min:0,max:2.5,color:'#B85C4A'}];
      buckets.forEach(b=>{b.val=rated.filter(m=>{const r=parseFloat(watched[m.spine].rating);return r>=b.min&&r<=b.max;}).length;});
      drawPie(canvas,buckets);
    }
  }
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function switchTab(t){activeTab=t;render();}
function setSearch(v){search=v;page=0;render();}
function setWave(i){waveFilter=waveFilter===i?-1:i;page=0;render();}
function setCountry(v){countryFilter=v;page=0;render();}
function setShow(v){showFilter=v;page=0;render();}
function setSort(v){sortBy=v;page=0;render();}
function setPage(p){page=p;render();window.scrollTo(0,0);}
function toggleExpand(spine){
  expandedSpine=expandedSpine===spine?null:spine;
  render();
  if(expandedSpine){const m=FILMS.find(f=>f.spine===spine);if(m)fetchTmdb(spine,m.title,m.year).then(()=>render());}
}
function toggleWatch(spine){
  if(watched[spine])delete watched[spine];
  else watched[spine]={date:new Date().toISOString().slice(0,10),rating:''};
  surpriseFilm=null;save();render();
}
function saveMeta(spine){
  const d=document.getElementById('d'+spine);const r=document.getElementById('r'+spine);
  watched[spine]={date:d?d.value:'',rating:r?r.value:''};
  save();expandedSpine=null;render();
}
function jumpTo(spine){
  search='';waveFilter=-1;countryFilter='';showFilter='all';sortBy='spine';
  const idx=FILMS.findIndex(f=>f.spine===spine);page=Math.floor(idx/PAGE_SIZE);
  expandedSpine=spine;
  render();
  const m=FILMS.find(f=>f.spine===spine);if(m)fetchTmdb(spine,m.title,m.year).then(()=>render());
}
function reroll(){rollSurprise();render();}
function exportData(){
  const data=JSON.stringify({watched,tmdbCache,exportDate:new Date().toISOString()},null,2);
  const blob=new Blob([data],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='criterion-tracker-backup.json';a.click();
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(data.watched){watched=data.watched;save();}
      if(data.tmdbCache){tmdbCache=data.tmdbCache;saveTmdb();}
      render();alert('Import réussi! '+Object.keys(data.watched||{}).length+' films importés.');
    }catch(err){alert('Erreur: fichier invalide');}
  };
  reader.readAsText(file);
}
render();
</script>
